<div class="page-wrapper">
  <div class="card">
    <div class="card-header">IT 01-1</div>
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="username">User</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            class="form-control"
            [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              class="form-control"
              [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
            />
            <button type="button" class="eye-btn" (click)="togglePassword()" tabindex="-1">
              @if (showPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              }
            </button>
          </div>
        </div>

        @if (errorMessage()) {
          <div class="alert-error">{{ errorMessage() }}</div>
        }

        <div class="form-actions">
          <button type="submit" class="btn-primary" [disabled]="isLoading()">
            {{ isLoading() ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ' }}
          </button>
        </div>

        <div class="form-link">
          <a routerLink="/register">สมัครสมาชิก</a>
        </div>
      </form>
    </div>
  </div>
</div>
