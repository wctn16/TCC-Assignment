<div class="page-wrapper">
  <div class="card">
    <div class="card-header">IT 02-2</div>
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="username">User</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            class="form-control"
            [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="form-control"
            [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            id="confirmPassword"
            type="password"
            formControlName="confirmPassword"
            class="form-control"
            [class.is-invalid]="(form.get('confirmPassword')?.invalid || passwordMismatch) && form.get('confirmPassword')?.touched"
          />
        </div>

        @if (passwordMismatch) {
          <div class="alert-error">รหัสผ่านไม่ตรงกัน</div>
        }

        @if (errorMessage()) {
          <div class="alert-error">{{ errorMessage() }}</div>
        }

        <div class="form-actions">
          <button type="submit" class="btn-primary" [disabled]="isLoading()">
            {{ isLoading() ? 'กำลังสมัคร...' : 'สมัครสมาชิก' }}
          </button>
        </div>

        <div class="form-link">
          <a routerLink="/login">มีบัญชีแล้ว? เข้าสู่ระบบ</a>
        </div>
      </form>
    </div>
  </div>
</div>
